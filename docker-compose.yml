services:

  postgres:
    image: postgres:15-alpine
    container_name: uniregis-db

    environment:
      POSTGRES_DB: uniregis_db
      POSTGRES_USER: uniregis_user
      POSTGRES_PASSWORD: uniregis_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniregis_user -d uniregis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payara:
    image: payara/server-full:6.2025.1-jdk17
    container_name: payara-server

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"
      - "4848:4848"

    volumes:
      - ./target/uniregis.war:/opt/payara/deployments/uniregis.war

volumes:
  postgres_data: